<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ArenaFlow - Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@400;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-surface": "#e5e2e1",
                        "surface-container-low": "#1c1b1b",
                        "on-primary-fixed-variant": "#004494",
                        "tertiary-container": "#b88900",
                        "on-error-container": "#ffdad6",
                        "primary-container": "#4d8efe",
                        "on-secondary-fixed-variant": "#005320",
                        "surface-variant": "#353534",
                        "surface-bright": "#393939",
                        "on-secondary-container": "#003210",
                        "on-primary-fixed": "#001a41",
                        "surface-container-highest": "#353534",
                        "on-secondary-fixed": "#002108",
                        "on-tertiary-fixed-variant": "#5c4300",
                        "on-surface": "#e5e2e1",
                        "on-secondary": "#003914",
                        "outline": "#8c909f",
                        "inverse-primary": "#005ac1",
                        "on-tertiary-fixed": "#261a00",
                        "on-tertiary": "#402d00",
                        "secondary-fixed": "#89fa9b",
                        "surface-dim": "#131313",
                        "surface": "#131313",
                        "error-container": "#93000a",
                        "primary-fixed": "#d8e2ff",
                        "secondary": "#6ddd81",
                        "on-surface-variant": "#c2c6d5",
                        "on-background": "#e5e2e1",
                        "error": "#ffb4ab",
                        "background": "#131313",
                        "tertiary-fixed": "#ffdea0",
                        "surface-container-lowest": "#0e0e0e",
                        "outline-variant": "#424753",
                        "on-error": "#690005",
                        "secondary-container": "#30a550",
                        "primary-fixed-dim": "#adc6ff",
                        "primary": "#adc6ff",
                        "on-primary": "#002e69",
                        "tertiary": "#fbbc06",
                        "tertiary-fixed-dim": "#fbbc06",
                        "on-tertiary-container": "#372700",
                        "surface-container": "#201f1f",
                        "inverse-on-surface": "#313030",
                        "secondary-fixed-dim": "#6ddd81",
                        "surface-container-high": "#2a2a2a",
                        "on-primary-container": "#00285c",
                        "surface-tint": "#adc6ff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Manrope', sans-serif; letter-spacing: -0.02em; }
        
        .bg-gradient-primary {
            background: linear-gradient(135deg, theme('colors.primary') 0%, #ff7eb3 100%);
        }
        .text-gradient-primary {
            background: linear-gradient(135deg, theme('colors.primary') 0%, #ff7eb3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .glass-panel {
            background-color: rgba(19, 19, 19, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .shadow-ambient {
            box-shadow: 0 0 40px -10px rgba(229, 226, 225, 0.06);
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden antialiased">
<!-- Ambient Background Elements -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-20%] right-[-10%] w-[50%] h-[50%] rounded-full bg-primary opacity-5 blur-[120px]"></div>
<div class="absolute bottom-[-20%] left-[-10%] w-[40%] h-[40%] rounded-full bg-[#ff7eb3] opacity-5 blur-[120px]"></div>
</div>
<!-- Main Container -->
<main class="w-full max-w-md px-6 py-12 z-10 relative flex flex-col items-center">
<!-- Brand / Header -->
<div class="mb-10 text-center">
<h1 class="font-headline text-5xl font-extrabold text-on-surface tracking-tighter mb-2">ArenaFlow</h1>
<p class="font-body text-on-surface-variant text-sm tracking-wide">ENTER THE ARENA.</p>
</div>
<!-- Auth Card -->
<div class="w-full bg-surface-container-low rounded-xl shadow-ambient p-8 flex flex-col gap-8">
<!-- Context Switcher -->
<div class="flex gap-4 mb-2">
<button class="flex-1 pb-3 border-b-2 border-primary text-primary font-headline font-bold text-lg text-left tracking-tight">Sign In</button>
<button class="flex-1 pb-3 border-b-2 border-outline-variant/15 text-on-surface-variant font-headline font-semibold text-lg text-left tracking-tight hover:text-on-surface transition-colors duration-200">Create Account</button>
</div>
<!-- Primary Auth Action -->
<button class="w-full flex items-center justify-center gap-3 bg-surface-container-highest hover:bg-surface-bright text-on-surface py-3 px-4 rounded-md transition-all duration-300 group">
<svg aria-hidden="true" class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-body font-medium text-sm tracking-wide">Sign in with Google</span>
</button>
<!-- Divider -->
<div class="flex items-center gap-4">
<div class="h-px flex-1 bg-outline-variant/20"></div>
<span class="font-body text-xs text-on-surface-variant uppercase tracking-widest">or</span>
<div class="h-px flex-1 bg-outline-variant/20"></div>
</div>
<!-- Form -->
<form class="flex flex-col gap-5">
<div class="flex flex-col gap-1.5">
<label class="font-body text-xs text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm">mail</span>
<input class="w-full bg-surface-container-highest border border-outline-variant/15 rounded-md py-3 pl-10 pr-4 text-sm font-body text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant" id="email" placeholder="nexus@arenaflow.io" required="" type="email"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center ml-1">
<label class="font-body text-xs text-on-surface-variant" for="password">Password</label>
<a class="font-body text-xs text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm">lock</span>
<input class="w-full bg-surface-container-highest border border-outline-variant/15 rounded-md py-3 pl-10 pr-4 text-sm font-body text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<button class="w-full bg-gradient-primary hover:scale-[1.02] active:scale-95 text-surface-dim font-headline font-bold text-sm py-3.5 rounded-md transition-transform duration-300 mt-2 shadow-[0_0_15px_rgba(173,198,255,0.2)]" type="submit">
                    Access Dashboard
                </button>
</form>
</div>
<!-- Footer Links -->
<div class="mt-8 text-center flex gap-6">
<a class="font-body text-xs text-on-surface-variant hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<a class="font-body text-xs text-on-surface-variant hover:text-on-surface transition-colors" href="#">Terms of Service</a>
</div>
</main>
</body></html>

            .glass-panel {
                @apply bg-surface/80 backdrop-blur-[20px];

<body class="bg-background text-on-surface font-body h-screen flex flex-col overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar (Shared Component) -->
<header class="bg-[#131313] dark:bg-[#131313] flex justify-between items-center w-full px-6 py-4 fixed top-0 z-40">
<div class="flex items-center gap-4">
<button class="text-[#4285F4] hover:bg-[#353534] transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="analytics" style="font-variation-settings: 'FILL' 0;">analytics</span>
</button>
<h1 class="font-['Manrope'] font-bold tracking-tight text-xl text-[#e5e2e1] tracking-tighter">ArenaFlow</h1>
</div>
<div class="flex items-center">
<button class="hover:bg-[#353534] transition-colors rounded-full overflow-hidden w-10 h-10 border border-[#1c1b1b]">
<img alt="Manager Profile" class="w-full h-full object-cover" data-alt="professional portrait of a facility manager in a dark suit against a neutral dark grey background, studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBS2h3d48A8zrjZFTd5zRJUzTkYv3szUb4Ttthj7d9x3HV7Zmu436zsD7LVRsvfyJzlX4xXPvdJ09JhE1CzYTvPwc5KbImS9uH17rUli-t34Z26WgGx261dJ9shKLvqQZBFmy0NAFVprF8F4BwSjBP2H8SyANiw21Mz0WsGOQrcnY-EhROmCtYFBBl_SnYdAYed5HtJeTEhesZr073JyLEbBjk0twATpSg1JjMbfXAt6TYi_XoLWOjmd0PzCynViOZThesvgR5-Cfkw"/>
</button>
</div>
</header>
<!-- Main Canvas: Flow Map -->
<main class="flex-1 relative w-full h-full mt-[72px] mb-[80px] bg-background">
<!-- Map Container -->
<div class="absolute inset-0 overflow-hidden touch-pan-x touch-pan-y">
<!-- Stylized Map Background Image -->
<div class="absolute inset-0 bg-cover bg-center opacity-40" data-alt="overhead view of a large modern sports stadium at night, dark high-contrast architectural lighting, deep shadows, tech blueprint aesthetic" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAOell4ddqZlf7SdKOX00N8OMa1wr468iNDNca6RFBQNksNv9PWOumj36y8_CqPXry_RrmGuNEEVIvUKa4wm5grDfDPwsfnYu4lzH-8cgfEDlr1YldbcBRVHvi9k6Px6hXWeoagS-6l-7pGtCZgnHxEpdI2joTXOxov0JcuJACfj35jyq56A9E__9mADLp4DtGk5sVPFdNUvvVQfKYg-081RkEB2r-GtLjt5zT2r_k9gLZ0T9GHkyOuaTZD4GiCi17Xvc2b_wXUFJic');"></div>
<!-- Heatmap Overlays (Radial Gradients simulating density) -->
<!-- High Density (Red) -->
<div class="absolute top-[30%] left-[45%] w-64 h-64 rounded-full bg-error/30 blur-[40px] pointer-events-none"></div>
<!-- Medium Density (Yellow) -->
<div class="absolute top-[50%] left-[20%] w-48 h-48 rounded-full bg-tertiary/20 blur-[30px] pointer-events-none"></div>
<!-- Low Density (Green) -->
<div class="absolute bottom-[20%] right-[30%] w-72 h-72 rounded-full bg-secondary/15 blur-[50px] pointer-events-none"></div>
<!-- SVG Fastest Path Overlay -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" preserveaspectratio="none" viewbox="0 0 100 100">
<path d="M 20 70 Q 40 40, 80 20" fill="none" stroke="url(#pathGradient)" stroke-dasharray="2 2" stroke-linecap="round" stroke-width="1.5"></path>
<defs>
<lineargradient id="pathGradient" x1="0%" x2="100%" y1="100%" y2="0%">
<stop offset="0%" stop-color="#adc6ff"></stop>
<stop offset="100%" stop-color="#ff8fab"></stop>
</lineargradient>
</defs>
</svg>
<!-- Map Markers -->
<!-- Start Point (Section 104) -->
<div class="absolute bottom-[28%] left-[18%] flex flex-col items-center translate-x-[-50%] translate-y-[-50%]">
<div class="w-4 h-4 rounded-full bg-primary shadow-[0_0_15px_rgba(173,198,255,0.8)] border-2 border-background"></div>
<div class="mt-1 px-2 py-0.5 rounded-lg bg-surface-container-high/90 backdrop-blur-sm text-[10px] font-bold text-on-surface font-body tracking-wider uppercase">Sec 104</div>
</div>
<!-- End Point (Exit B) -->
<div class="absolute top-[18%] right-[18%] flex flex-col items-center translate-x-[-50%] translate-y-[-50%]">
<!-- Kinetic Pulsar -->
<div class="relative flex items-center justify-center">
<div class="absolute w-8 h-8 rounded-full bg-secondary opacity-30 animate-ping"></div>
<div class="w-5 h-5 rounded-full bg-secondary shadow-[0_0_12px_rgba(109,221,129,1)] border-2 border-background z-10"></div>
</div>
<div class="mt-1 px-2 py-0.5 rounded-lg bg-surface-container-high/90 backdrop-blur-sm text-[10px] font-bold text-on-surface font-body tracking-wider uppercase">Exit B</div>
</div>
<!-- Concession Marker (Fan Favorite) -->
<div class="absolute top-[40%] left-[60%] flex flex-col items-center translate-x-[-50%] translate-y-[-50%]">
<div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center shadow-lg border border-outline-variant/30">
<span class="material-symbols-outlined text-tertiary text-sm" data-icon="local_pizza" style="font-variation-settings: 'FILL' 1;">local_pizza</span>
</div>
</div>
<div class="absolute top-[60%] right-[40%] flex flex-col items-center translate-x-[-50%] translate-y-[-50%]">
<div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center shadow-lg border border-outline-variant/30">
<span class="material-symbols-outlined text-tertiary text-sm" data-icon="sports_bar" style="font-variation-settings: 'FILL' 1;">sports_bar</span>
</div>
</div>
</div>
<!-- Floating UI / Bento Grids -->
<div class="absolute bottom-6 left-4 right-4 z-30">
<!-- Active Route Card (Glassmorphism) -->
<div class="glass-panel rounded-2xl p-5 border border-outline-variant/15 flex flex-col gap-4 shadow-[0_8px_32px_rgba(0,0,0,0.6)]">
<div class="flex justify-between items-start">
<div class="flex flex-col">
<span class="text-xs font-bold tracking-widest text-secondary uppercase mb-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]" data-icon="my_location" style="font-variation-settings: 'FILL' 1;">my_location</span>
                            Fastest Route Active
                        </span>
<h2 class="font-headline text-2xl font-bold text-on-surface tracking-tight">Sec 104 to Exit B</h2>
</div>
<div class="bg-surface-container-highest rounded-full px-3 py-1 flex items-center gap-1">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="schedule">schedule</span>
<span class="text-sm font-medium text-on-surface">4 min</span>
</div>
</div>
<!-- Metrics Row -->
<div class="flex gap-3 mt-2">
<div class="flex-1 bg-surface-container-low rounded-xl p-3 flex flex-col">
<span class="text-[10px] text-on-surface-variant uppercase tracking-wider mb-1">Density Ahead</span>
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-secondary"></div>
<span class="text-sm font-semibold text-on-surface">Clear Path</span>
</div>
</div>
<button class="bg-surface-container-highest hover:bg-surface-bright transition-colors rounded-xl px-4 py-3 flex items-center justify-center border border-outline-variant/15">
<span class="material-symbols-outlined text-on-surface" data-icon="close">close</span>
</button>
</div>
</div>
</div>
</main>

<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-[#1c1b1b]/80 backdrop-blur-xl shadow-[0_-4px_40px_rgba(0,0,0,0.5)] rounded-t-[2rem] md:hidden">
<!-- Active Tab: Flow Map -->
<a class="flex flex-col items-center justify-center bg-gradient-to-br from-[#4285F4] to-[#ea4335] text-white rounded-xl px-4 py-2 hover:text-[#4285F4] transition-all transform scale-110 duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1 text-[20px]" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-bold">Flow Map</span>
</a>
<!-- Inactive Tab: Time-Saver -->
<a class="flex flex-col items-center justify-center text-[#e5e2e1]/40 px-4 py-2 hover:text-[#4285F4] transition-all" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]" data-icon="schedule" style="font-variation-settings: 'FILL' 0;">schedule</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-bold">Time-Saver</span>
</a>
<!-- Inactive Tab: Pulse -->
<a class="flex flex-col items-center justify-center text-[#e5e2e1]/40 px-4 py-2 hover:text-[#4285F4] transition-all" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]" data-icon="electric_bolt" style="font-variation-settings: 'FILL' 0;">electric_bolt</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-bold">Pulse</span>
</a>
<!-- Inactive Tab: Profile -->
<a class="flex flex-col items-center justify-center text-[#e5e2e1]/40 px-4 py-2 hover:text-[#4285F4] transition-all" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]" data-icon="person" style="font-variation-settings: 'FILL' 0;">person</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-bold">Profile</span>

</nav>

<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Report Crowd Status</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-bright": "#f9f9ff",
                        "background": "#f9f9ff",
                        "secondary-fixed-dim": "#b1c6f7",
                        "surface-dim": "#d8d9e3",
                        "secondary": "#495e89",
                        "surface-tint": "#005ac1",
                        "tertiary-fixed": "#ffd9e1",
                        "outline-variant": "#c2c6d5",
                        "primary-fixed": "#d8e2ff",
                        "error": "#ba1a1a",
                        "surface-container-low": "#f2f3fd",
                        "on-secondary-container": "#415680",
                        "on-secondary": "#ffffff",
                        "surface-container": "#ecedf7",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#fefcff",
                        "tertiary-fixed-dim": "#ffb1c5",
                        "on-surface": "#191b22",
                        "secondary-fixed": "#d8e2ff",
                        "secondary-container": "#b7ccfd",
                        "inverse-primary": "#adc6ff",
                        "primary": "#0058bd",
                        "on-primary-fixed": "#001a41",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "primary-container": "#2771df",
                        "inverse-surface": "#2e3038",
                        "tertiary": "#a8295b",
                        "on-tertiary-container": "#fffbff",
                        "surface": "#f9f9ff",
                        "primary-fixed-dim": "#adc6ff",
                        "on-primary-fixed-variant": "#004494",
                        "on-tertiary-fixed": "#3f001b",
                        "on-secondary-fixed-variant": "#31466f",
                        "on-error": "#ffffff",
                        "tertiary-container": "#c84373",
                        "on-background": "#191b22",
                        "surface-container-highest": "#e1e2eb",
                        "on-secondary-fixed": "#001a41",
                        "surface-variant": "#e1e2eb",
                        "on-tertiary-fixed-variant": "#8b0e45",
                        "inverse-on-surface": "#eff0fa",
                        "surface-container-high": "#e7e7f1",
                        "on-surface-variant": "#424753",
                        "on-error-container": "#93000a",
                        "error-container": "#ffdad6",
                        "outline": "#727785"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Plus Jakarta Sans", "sans-serif"],
                        "label": ["Plus Jakarta Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
<!-- TopAppBar -->
<header class="bg-white/80 backdrop-blur-xl docked full-width top-0 border-b border-slate-200/50 flat no-shadow transition-all duration-300 ease-in-out flex justify-between items-center px-6 py-4 w-full z-40 sticky">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden shrink-0">
<span class="material-symbols-outlined text-primary">person</span>
</div>
<h1 class="font-['Plus_Jakarta_Sans'] font-black tracking-tighter text-blue-700 text-xl uppercase">ARENAFLOW</h1>
</div>
<button class="w-10 h-10 rounded-full bg-surface-container-lowest border border-outline-variant/15 flex items-center justify-center text-on-surface hover:bg-slate-100 transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-6 pt-8 pb-32 max-w-lg mx-auto w-full">
<!-- Hero Section -->
<div class="mb-12 text-center">
<h2 class="font-headline font-black text-4xl tracking-tight text-on-surface mb-3">Report Status</h2>
<p class="font-body text-on-surface-variant text-lg leading-relaxed max-w-xs mx-auto">Select the current crowd density to update the live map.</p>
</div>
<!-- Reporting Grid -->
<div class="grid grid-cols-1 gap-6 w-full">
<!-- Empty Option -->
<button class="group relative overflow-hidden bg-surface-container-lowest rounded-[2rem] p-6 border border-outline-variant/15 shadow-[0px_20px_40px_rgba(0,88,189,0.02)] hover:shadow-[0px_20px_40px_rgba(0,88,189,0.06)] hover:bg-surface-container-low transition-all duration-300 flex items-center justify-between text-left h-32 active:scale-[0.98]">
<div class="flex items-center gap-6 relative z-10">
<div class="w-16 h-16 rounded-full bg-secondary-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-3xl text-on-secondary-container" style="font-variation-settings: 'FILL' 1;">directions_run</span>
</div>
<div>
<h3 class="font-headline font-bold text-2xl text-on-surface mb-1">Empty</h3>
<p class="font-label text-sm font-medium tracking-wide text-primary uppercase">Speedy</p>
</div>
</div>
<div class="w-10 h-10 rounded-full bg-surface-bright flex items-center justify-center border border-outline-variant/10 group-hover:bg-primary group-hover:text-on-primary transition-colors text-outline">
<span class="material-symbols-outlined">arrow_forward</span>
</div>
</button>
<!-- Moderate Option -->
<button class="group relative overflow-hidden bg-surface-container-lowest rounded-[2rem] p-6 border border-outline-variant/15 shadow-[0px_20px_40px_rgba(0,88,189,0.02)] hover:shadow-[0px_20px_40px_rgba(0,88,189,0.06)] hover:bg-surface-container-low transition-all duration-300 flex items-center justify-between text-left h-32 active:scale-[0.98]">
<div class="flex items-center gap-6 relative z-10">
<div class="w-16 h-16 rounded-full bg-surface-variant flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-3xl text-on-surface-variant" style="font-variation-settings: 'FILL' 1;">directions_walk</span>
</div>
<div>
<h3 class="font-headline font-bold text-2xl text-on-surface mb-1">Moderate</h3>
<p class="font-label text-sm font-medium tracking-wide text-on-surface-variant uppercase">Steady</p>
</div>
</div>
<div class="w-10 h-10 rounded-full bg-surface-bright flex items-center justify-center border border-outline-variant/10 group-hover:bg-primary group-hover:text-on-primary transition-colors text-outline">
<span class="material-symbols-outlined">arrow_forward</span>
</div>
</button>
<!-- Long Option -->
<button class="group relative overflow-hidden bg-surface-container-lowest rounded-[2rem] p-6 border border-outline-variant/15 shadow-[0px_20px_40px_rgba(0,88,189,0.02)] hover:shadow-[0px_20px_40px_rgba(0,88,189,0.06)] hover:bg-surface-container-low transition-all duration-300 flex items-center justify-between text-left h-32 active:scale-[0.98]">
<div class="flex items-center gap-6 relative z-10">
<div class="w-16 h-16 rounded-full bg-error-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-3xl text-on-error-container" style="font-variation-settings: 'FILL' 1;">groups</span>
</div>
<div>
<h3 class="font-headline font-bold text-2xl text-on-surface mb-1">Long</h3>
<p class="font-label text-sm font-medium tracking-wide text-error uppercase">Heavy</p>
</div>
</div>
<div class="w-10 h-10 rounded-full bg-surface-bright flex items-center justify-center border border-outline-variant/10 group-hover:bg-primary group-hover:text-on-primary transition-colors text-outline">
<span class="material-symbols-outlined">arrow_forward</span>
</div>
</button>
<!-- Stuck Option -->
<button class="group relative overflow-hidden bg-surface-container-lowest rounded-[2rem] p-6 border border-outline-variant/15 shadow-[0px_20px_40px_rgba(0,88,189,0.02)] hover:shadow-[0px_20px_40px_rgba(0,88,189,0.06)] hover:bg-surface-container-low transition-all duration-300 flex items-center justify-between text-left h-32 active:scale-[0.98]">
<div class="absolute inset-0 bg-gradient-to-r from-primary to-tertiary opacity-0 group-hover:opacity-5 transition-opacity duration-500"></div>
<div class="flex items-center gap-6 relative z-10">
<div class="w-16 h-16 rounded-full bg-inverse-surface flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-3xl text-inverse-on-surface" style="font-variation-settings: 'FILL' 1;">do_not_disturb_on</span>
</div>
<div>
<h3 class="font-headline font-bold text-2xl text-on-surface mb-1">Stuck</h3>
<p class="font-label text-sm font-medium tracking-wide text-tertiary uppercase">Bottleneck</p>
</div>
</div>
<div class="w-10 h-10 rounded-full bg-surface-bright flex items-center justify-center border border-outline-variant/10 group-hover:bg-gradient-to-r group-hover:from-primary group-hover:to-tertiary group-hover:text-on-primary group-hover:border-transparent transition-all text-outline">
<span class="material-symbols-outlined">arrow_forward</span>
</div>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center pt-3 pb-8 px-4 bg-white/80 backdrop-blur-xl rounded-t-3xl border-t-0 shadow-[0px_-10px_30px_rgba(0,88,189,0.04)] hidden md:flex md:hidden bg-surface-container-low">
<a class="flex flex-col items-center justify-center text-slate-400 px-4 py-1.5 hover:text-blue-600 transition-all" href="#">
<span class="material-symbols-outlined mb-1">map</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-bold uppercase tracking-widest">Flow</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 px-4 py-1.5 hover:text-blue-600 transition-all" href="#">
<span class="material-symbols-outlined mb-1">fastfood</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-bold uppercase tracking-widest">Eats</span>
</a>
<!-- Active Tab: Report -->
<a class="flex flex-col items-center justify-center bg-blue-50 text-blue-700 rounded-2xl px-4 py-1.5 transition-all active:scale-95 duration-200" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">campaign</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-bold uppercase tracking-widest">Report</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 px-4 py-1.5 hover:text-blue-600 transition-all" href="#">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-bold uppercase tracking-widest">Profile</span>
</a>
</nav>

</body></html>
